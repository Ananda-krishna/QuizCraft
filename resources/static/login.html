<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizCraft - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="dirt-border"></div>
            <h1 class="login-title pixel-text">Quiz<span>Craft</span></h1>
            
            <div class="login-content">
                <p class="pixel-text" style="text-align: center; margin-bottom: 2rem; font-size: 1.5rem; color: #333;">Welcome, Traveler! Sign in to join the world.</p>
                
                <form id="login-form" class="pixel-text">
                    <div class="input-group">
                        <label for="email">Gmail Address</label>
                        <input type="email" id="email" placeholder="steve@gmail.com" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="********" required>
                    </div>
                    
                    <button type="submit" class="mc-btn login-btn">
                        <span>Sign In</span>
                    </button>
                </form>

                <div id="login-error" class="hidden pixel-text" style="color: #FF5555; text-align: center; margin-top: 1.5rem;">Invalid Gmail or Password!</div>
            </div>
            
            <div style="margin-top: 2rem; text-align: center; font-size: 0.9rem; color: #666;" class="pixel-text">
                Hint: Use your gmail and "minecraft" as password.
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginError = document.getElementById('login-error');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple validation
            if (!email.endsWith('@gmail.com')) {
                loginError.textContent = "Please use a valid @gmail.com address!";
                loginError.classList.remove('hidden');
                return;
            }

            if (password !== 'minecraft') {
                loginError.textContent = "Incorrect Password!";
                loginError.classList.remove('hidden');
                return;
            }

            // Success! Store user info
            const name = email.split('@')[0]; // Use the part before @ as the username
            localStorage.setItem('quizcraft_user', name.charAt(0).toUpperCase() + name.slice(1));
            localStorage.setItem('quizcraft_email', email);
            
            // For the profile picture, we'll use a DiceBear pixel-art avatar since we don't have Google's
            const avatarUrl = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${name}`;
            localStorage.setItem('quizcraft_picture', avatarUrl);
            
            // Redirect to game
            window.location.href = '/index.html';
        });

        // Check if already logged in
        if (localStorage.getItem('quizcraft_user')) {
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
